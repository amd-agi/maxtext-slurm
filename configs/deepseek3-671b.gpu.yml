# ── Run Config ───────────────────────────────────────────────────────────────
base_config: "base.yml"
run_name: "deepseek3-671b_train_test"
hardware: "gpu"
model_name: "deepseek3-671b"

# ── Training ─────────────────────────────────────────────────────────────────
steps: 15

# ── Parallelism ──────────────────────────────────────────────────────────────
# At most one DCN axis can be unspecified (-1)
dcn_data_parallelism: -1 # auto-sharded
dcn_fsdp_parallelism: 8
dcn_sequence_parallelism: 1 # never recommended
dcn_context_parallelism: 1
dcn_tensor_parallelism: 1 # never recommended
dcn_pipeline_parallelism: 1
dcn_expert_parallelism: 1
# At most one ICI axis can be unspecified (-1)
ici_data_parallelism: 1
ici_fsdp_parallelism: 1
ici_sequence_parallelism: 1
ici_context_parallelism: 1
ici_tensor_parallelism: 1
ici_pipeline_parallelism: 1
ici_expert_parallelism: 8

# Used only when dcn_pipeline_parallelism > 1.  56 = 7 × 8 makes the
# 58-decoder-layer DS3 divide cleanly into 8 PP stages × V=7 chunks of 1
# layer each, with the 2 leftover layers run unpipelined.  Harmless when
# PP=1.
pipeline_parallel_layers: 56

# ── Batch & Sequence ─────────────────────────────────────────────────────────
per_device_batch_size: 16
max_target_length: 4096
packing: true
max_segments_per_seq: 32

# ── Attention & Compute ──────────────────────────────────────────────────────
attention: "cudnn_flash_te"
remat_policy: "full"
use_iota_embed: True
scan_layers: True
logits_dot_in_fp32: False
shardy: false

# ── Dtypes ────────────────────────────────────────────────────────────────────
dtype: bfloat16
weight_dtype: bfloat16

# ── MoE Runtime ──────────────────────────────────────────────────────────────
megablox: False
sparse_matmul: False
capacity_factor: 1.25

# ── Profiler ─────────────────────────────────────────────────────────────────
profiler: ""
upload_all_profiler_results: true
skip_first_n_steps_for_profiler: 5
profiler_steps: 3

# ── Checkpointing ────────────────────────────────────────────────────────────
enable_checkpointing: False
async_checkpointing: False

# ── Dataset ──────────────────────────────────────────────────────────────────
# Real-data default; tokenizer vocab (129280) must match this model. For
# tuning, CLI-override with `dataset_type=synthetic steps=15`.
dataset_type: grain
grain_file_type: parquet
grain_train_files: /datasets/c4/en/3.0.1/parquet/c4-train-*-of-01024.parquet
# 1 matches base.yml; see data-loading-deepseek3-671b.md for why not 16.
grain_worker_count: 1
tokenizer_type: huggingface
tokenizer_path: deepseek-ai/DeepSeek-V3-Base
# Set hf_access_token only if the tokenizer comes from a gated HuggingFace model
# (e.g. meta-llama/Llama-2-7b). Not needed for public models like DeepSeek-V3-Base.
hf_access_token: ""
