# ── Run Config ───────────────────────────────────────────────────────────────
base_config: "base.yml"
run_name: "llama3_405B_training_2n"
hardware: "gpu"
model_name: "llama3.1-405b"

# ── Training ─────────────────────────────────────────────────────────────────
steps: 15

# ── Parallelism ──────────────────────────────────────────────────────────────
# Apples-to-apples with llama3.1-405b.gpu.yml: pure FSDP across all devices.
# At 2N × 8 GPUs: ici_fsdp=-1 → 8-way within node, dcn_fsdp=-1 → 2-way across nodes.
# Cross-node FSDP collectives still occur every step (narrower ring than 8N, but
# same communication pattern), preserving the ANP delta signal as much as possible.
dcn_data_parallelism: 1
dcn_fsdp_parallelism: -1
dcn_sequence_parallelism: 1
dcn_tensor_parallelism: 1
dcn_pipeline_parallelism: 1
ici_data_parallelism: 1
ici_fsdp_parallelism: -1
ici_sequence_parallelism: 1
ici_tensor_parallelism: 1
ici_pipeline_parallelism: 1

# ── Batch & Sequence ─────────────────────────────────────────────────────────
# pdbs scales with node count because FSDP shards weights/grad/optimizer per rank;
# more nodes → smaller residency per GPU → more headroom for activations.
per_device_batch_size: 1 # 1 for 2 nodes, 3 for 4 nodes, 5 for 8 nodes
max_target_length: 8192
packing: true
max_segments_per_seq: 32

# ── Attention & Compute ──────────────────────────────────────────────────────
attention: "cudnn_flash_te"
remat_policy: 'full'
use_iota_embed: True
scan_layers: True
logits_dot_in_fp32: False
megablox: False
optimizer_memory_host_offload: False
param_scan_axis: 1
shardy: False

# ── Dtypes & Quantization ────────────────────────────────────────────────────
dtype: "bfloat16"
weight_dtype: bfloat16
quantization: "fp8"
quantize_kvcache: False
kv_quant_axis: "heads_and_dkv"
kv_quant_dtype: "int8"
checkpoint_is_quantized: False

# ── Profiler ─────────────────────────────────────────────────────────────────
profiler: "" #"xplane"
skip_first_n_steps_for_profiler: 3
profiler_steps: 1

# ── Checkpointing ────────────────────────────────────────────────────────────
enable_checkpointing: False
async_checkpointing: False

# ── Dataset ──────────────────────────────────────────────────────────────────
dataset_type: "synthetic"
tokenizer_path: "meta-llama/Llama-3.3-70B-Instruct"
